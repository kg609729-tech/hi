<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Forgive Me</title>
  <style>
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: 'Poppins', sans-serif;
      color: #fff;
      text-align: center;
      overflow: hidden;
      background: linear-gradient(135deg, #ff9a9e, #fad0c4);
    }

    /* Floating hearts background */
    .heart {
      position: absolute;
      width: 20px;
      height: 20px;
      background: pink;
      transform: rotate(45deg);
      animation: float 10s infinite ease-in;
    }
    .heart::before,
    .heart::after {
      content: '';
      position: absolute;
      width: 20px;
      height: 20px;
      background: pink;
      border-radius: 50%;
    }
    .heart::before { top: -10px; left: 0; }
    .heart::after { left: 10px; top: 0; }

    @keyframes float {
      0% { transform: translateY(100vh) rotate(45deg); opacity: 0; }
      50% { opacity: 1; }
      100% { transform: translateY(-10vh) rotate(45deg); opacity: 0; }
    }

    .container {
      max-width: 600px;
      z-index: 2;
    }

    h1 {
      font-size: 2.5em;
      margin-bottom: 20px;
      text-shadow: 0 0 15px #fff;
    }

    .options button {
      margin: 10px;
      padding: 20px;
      background: #ff6ec7;
      border: none;
      color: white;
      font-size: 1.2em;
      cursor: pointer;
      transition: transform 0.3s ease;
      clip-path: polygon(50% 0%, 100% 35%, 80% 100%, 20% 100%, 0% 35%);
    }

    .options button:hover {
      transform: scale(1.2);
      background: #ff3cac;
    }

    .hidden { display: none; }

    img {
      max-width: 300px;
      margin: 20px auto;
      display: block;
      border-radius: 15px;
      box-shadow: 0 0 20px rgba(255, 105, 180, 0.7);
    }

    /* Sad page shake animation */
    #noPage h1 {
      animation: shake 0.5s;
    }
    @keyframes shake {
      0% { transform: translateX(0); }
      25% { transform: translateX(-5px); }
      50% { transform: translateX(5px); }
      75% { transform: translateX(-5px); }
      100% { transform: translateX(0); }
    }
  </style>
</head>
<body>
  <!-- Floating hearts -->
  <div class="heart" style="left:10%; animation-delay:0s;"></div>
  <div class="heart" style="left:30%; animation-delay:2s;"></div>
  <div class="heart" style="left:50%; animation-delay:4s;"></div>
  <div class="heart" style="left:70%; animation-delay:6s;"></div>
  <div class="heart" style="left:90%; animation-delay:8s;"></div>

  <div class="container" id="main">
    <h1>Please Samadrita forgive me,<br>I love you to the moon and back 💖</h1>
    <p>Will you please forgive me?</p>
    <div class="options">
      <button onclick="showYes()">Yes</button>
      <button onclick="showNo()">No</button>
    </div>
  </div>

  <div class="container hidden" id="yesPage">
    <img src="panda.png" alt="Panda with bouquet">
    <h1>Thank you so much,<br>I love you so much ❤️</h1>
    <audio id="music" src="romantic.mp3" autoplay loop></audio>
  </div>

  <div class="container hidden" id="noPage">
    <h1>Oh no... 😢</h1>
    <button onclick="tryAgain()">Try Again</button>
  </div>

  <script>
    function showYes() {
      document.getElementById('main').classList.add('hidden');
      document.getElementById('yesPage').classList.remove('hidden');
      document.getElementById('music').play();
    }

    function showNo() {
      document.getElementById('main').classList.add('hidden');
      document.getElementById('noPage').classList.remove('hidden');
    }

    function tryAgain() {
      document.getElementById('noPage').classList.add('hidden');
      document.getElementById('main').classList.remove('hidden');
    }
  </script>
</body>
</html>
